name: Build Android Firebase Release

on:
  push:
    tags:
      - "essai-android-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing essai-android-v* tag to build"
        required: true
        type: string

concurrency:
  group: build-android-release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Trigger tagged Android Firebase build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Validate release tag
        run: |
          if [[ ! "$RELEASE_REF" =~ ^essai-android-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_REF must match essai-android-vX.Y.Z; got $RELEASE_REF"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Trigger Android Firebase build
        working-directory: packages/mobile
        run: eas build --platform android --profile firebase --non-interactive --no-wait --message "$RELEASE_REF"
