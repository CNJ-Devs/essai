name: Check Dispatch Token Expiry

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  DISPATCH_TOKEN_EXPIRES_AT: ${{ vars.GITHUB_DISPATCH_TOKEN_EXPIRES_AT }}

jobs:
  check:
    name: Check GITHUB_DISPATCH_TOKEN expiry
    runs-on: ubuntu-latest
    steps:
      - name: Check expiry window
        run: |
          set -euo pipefail

          node <<'NODE'
          const expiresAtValue = process.env.DISPATCH_TOKEN_EXPIRES_AT;

          if (!expiresAtValue) {
            console.log("::warning::GITHUB_DISPATCH_TOKEN_EXPIRES_AT is not configured. Add a repository variable with the token expiration date, for example 2027-07-05.");
            process.exit(0);
          }

          const expiresAt = parseExpirationDate(expiresAtValue);
          const now = new Date();
          const daysLeft = Math.ceil((expiresAt.getTime() - now.getTime()) / 86_400_000);

          if (Number.isNaN(daysLeft)) {
            console.log(`::error::GITHUB_DISPATCH_TOKEN_EXPIRES_AT is invalid: ${expiresAtValue}`);
            process.exit(1);
          }

          if (daysLeft <= 0) {
            notify({
              level: "error",
              message: `GITHUB_DISPATCH_TOKEN expired ${Math.abs(daysLeft)} day(s) ago. Rotate it and update the Vercel GITHUB_DISPATCH_TOKEN environment variable.`,
            });
            process.exit(1);
          }

          if (daysLeft <= 7) {
            notify({
              level: "warning",
              message: `GITHUB_DISPATCH_TOKEN expires in ${daysLeft} day(s). Rotate it soon and update the Vercel GITHUB_DISPATCH_TOKEN environment variable.`,
            });
            process.exit(0);
          }

          if (daysLeft <= 30) {
            notify({
              level: "notice",
              message: `GITHUB_DISPATCH_TOKEN expires in ${daysLeft} day(s). Plan a rotation before it breaks the EAS webhook dispatch path.`,
            });
            process.exit(0);
          }

          console.log(`GITHUB_DISPATCH_TOKEN expiry check passed: ${daysLeft} day(s) left.`);

          function parseExpirationDate(value) {
            if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
              return new Date(`${value}T00:00:00.000Z`);
            }

            return new Date(value);
          }

          function notify({ level, message }) {
            const command = level === "error" ? "error" : level === "warning" ? "warning" : "notice";
            console.log(`::${command}::${message}`);

            // TODO: Send this notification to Feishu or another external channel.
            // Keep the GitHub annotation above as the fallback signal.
          }
          NODE
