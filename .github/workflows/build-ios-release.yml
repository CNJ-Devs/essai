name: Build iOS Release

on:
  push:
    tags:
      - "essai-ios-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing essai-ios-v* tag to build"
        required: true
        type: string

concurrency:
  group: build-ios-release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Trigger tagged iOS production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Validate release tag
        run: |
          if [[ ! "$RELEASE_REF" =~ ^essai-ios-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_REF must match essai-ios-vX.Y.Z; got $RELEASE_REF"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Trigger iOS production build
        working-directory: packages/mobile
        run: eas build --platform ios --profile production --non-interactive --no-wait --message "$RELEASE_REF"
