name: Build Mobile iOS

on:
  push:
    tags:
      - "essai-ios-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing essai-ios-v* tag to build"
        required: true
        type: string

concurrency:
  group: build-mobile-ios
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Trigger EAS iOS store build
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        run: |
          if [[ ! "$RELEASE_REF" =~ ^essai-ios-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_REF must match essai-ios-vX.Y.Z; got $RELEASE_REF"
            exit 1
          fi

      - name: Check Expo token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN is required to trigger EAS builds."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger iOS store build
        working-directory: packages/mobile
        run: eas build --platform ios --profile store --non-interactive --no-wait
